global:
  cert_file:        ""
  cert_key:         ""
  users:
    - username:     "test"
      password:     "test"
      err_code:     200
    - username:     "test1"
      password:     "test1"

logger:
  urls:             []
  #urls:             ["http://127.0.0.1:8081"]

backends:
  - backend:        "etcd"
    id:             "etcd"
    cache:          true
    debug:          true
    nodes:          ["http://127.0.0.1:2379"]
    read:
      username:     ""
      password:     ""
    write:
      username:     ""
      password:     ""
    checks:
      get:
        - path:       "^/$"
          users:      [""]
        - path:       "^/ps$"
          users:      ["test","test1",""]
        - path:       "^/ps/hosts$"
          users:      ["test","test1",""]
        - path:       "^/ps/hosts/test50"
          users:      ["test"]
        - path:       "^/ps/hosts/test60"
          users:      ["test1"]
        - path:       ".*"
          users:      [""]
      put:
        - path:       ".*"
          #regexp:     ""
          #schema:     "file:///Users/dmitry/Documents/github/confd/config/schema.json"
          users:      ["test","test1"]
      delete:
        - path:       ".*"
          users:      ["test","test1",""]

  #- backend:        "consul"
